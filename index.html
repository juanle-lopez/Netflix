<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netflix Audit Pro | Estado Persistente</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --n-red: #E50914; --bg: #000; --card: #0a0a0a; --border: #252525; 
            --text: #fff; --yellow: #D4AF37; --muted: #888;
        }
        body.light-mode {
            --bg: #f5f5f5; --card: #ffffff; --border: #dcdcdc; --text: #141414; --muted: #444;
        }
        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        @media (min-width: 1024px) {
            body { height: 100vh; overflow: hidden; }
            .container { height: 100vh; display: flex; flex-direction: column; padding: 20px; gap: 15px; }
            .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; flex: 1; min-height: 0; }
            .charts-left { display: grid; grid-template-rows: 1.2fr 1fr; gap: 15px; min-height: 0; }
            .charts-bottom-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; min-height: 0; }
        }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; }
        .logo { color: var(--n-red); font-weight: 900; font-size: 1.6rem; letter-spacing: -1.5px; }
        .toolbar { display: flex; gap: 12px; align-items: center; }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        input[type="date"] { background: var(--card); border: 1px solid var(--yellow); color: var(--text); padding: 6px 10px; border-radius: 4px; color-scheme: dark; font-weight: bold; }
        body.light-mode input[type="date"] { color-scheme: light; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(70%) sepia(50%) saturate(1000%) hue-rotate(10deg); cursor: pointer; }
        .btn-pdf { background: var(--n-red); color: #fff; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: 900; }
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .metric-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .metric-card h4 { margin: 0; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
        .metric-card .val { font-size: 2.5rem; font-weight: 900; display: block; margin-top: 5px; }
        .sub-crit { font-size: 0.75rem; color: var(--yellow); font-weight: 800; }
        .chart-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; }
        .chart-box h2 { font-size: 0.75rem; margin: 0 0 10px 0; color: var(--text); text-transform: uppercase; border-left: 3px solid var(--n-red); padding-left: 8px; }
        .canvas-container { flex: 1; position: relative; min-height: 180px; }
        .top-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .top-table td { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .hours-label { text-align: right; font-weight: 900; color: var(--n-red); font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container" id="dashboard-content">
    <header>
        <div class="logo">NETFLIX AUDIT PRO</div>
        <div class="toolbar no-print">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Claro</button>
            <input type="date" id="start">
            <input type="date" id="end">
            <button class="btn-pdf" onclick="generatePDF()">PDF</button>
        </div>
    </header>

    <div class="metrics-grid">
        <div class="metric-card"><h4>Media Diaria</h4><span class="val" id="m-daily">0.0h</span></div>
        <div class="metric-card"><h4>Media Semanal</h4><span class="val" id="m-weekly">0.0h</span></div>
        <div class="metric-card"><h4>Total Periodo</h4><span class="val" id="m-total">0.0h</span></div>
        <div class="metric-card"><h4>Días Críticos</h4><span class="val" id="m-crit" style="color:var(--n-red)">0</span><span class="sub-crit">> 5 HORAS</span></div>
    </div>

    <div class="main-grid">
        <div class="charts-left">
            <div class="chart-box">
                <h2>Visionado por Horas (Suma de 7 días centrada)</h2>
                <div class="canvas-container"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="charts-bottom-row">
                <div class="chart-box"><h2>Impacto Serie</h2><div class="canvas-container"><canvas id="seriesChart"></canvas></div></div>
                <div class="chart-box"><h2>Balance Semanal (Lun-Dom)</h2><div class="canvas-container"><canvas id="balanceChart"></canvas></div></div>
                <div class="chart-box"><h2>Media vs Jornada 40h</h2><div class="canvas-container"><canvas id="avgVsWorkChart"></canvas></div></div>
            </div>
        </div>
        <aside class="chart-box" style="overflow-y: auto;">
            <h2>Récords del Periodo (Top 15)</h2>
            <table class="top-table" id="records-table"></table>
        </aside>
    </div>
</div>

<script>
    let isLight = false;
    let mainChart, seriesChart, balanceChart, avgVsWorkChart;
    const shortDays = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    const longDays = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const shortMonths = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

    const masterData = [{"d": "2025-01-01", "h": 2.15, "s": {"Our Little Secret": 0.72, "The Intern": 0.72, "The Merry Gentlemen": 0.72}}, {"d": "2025-01-02", "h": 1.43, "s": {"House, M.D.": 0.72, "The Perfect Couple": 0.72}}, {"d": "2025-01-05", "h": 2.15, "s": {"House, M.D.": 0.72, "The Perfect Couple": 1.43}}, {"d": "2025-04-12", "h": 5.73, "s": {"Suits": 5.73}}, {"d": "2026-02-01", "h": 6.44, "s": {"Grey's Anatomy": 6.44}}, {"d": "2026-02-02", "h": 8.59, "s": {"Grey's Anatomy": 8.59}}, {"d": "2026-02-03", "h": 5.73, "s": {"Grey's Anatomy": 5.73}}, {"d": "2026-02-04", "h": 9.31, "s": {"Grey's Anatomy": 9.31}}, {"d": "2026-02-05", "h": 7.16, "s": {"Grey's Anatomy": 7.16}}, {"d": "2026-02-06", "h": 7.16, "s": {"Grey's Anatomy": 7.16}}, {"d": "2026-02-07", "h": 13.6, "s": {"Grey's Anatomy": 13.6}}, {"d": "2026-02-08", "h": 12.17, "s": {"Grey's Anatomy": 12.17}}, {"d": "2026-02-09", "h": 7.16, "s": {"Grey's Anatomy": 7.16}}, {"d": "2026-02-10", "h": 1.43, "s": {"Grey's Anatomy": 1.43}}, {"d": "2026-02-17", "h": 0.72, "s": {"Grey's Anatomy": 0.72}}, {"d": "2026-02-22", "h": 3.58, "s": {"Grey's Anatomy": 3.58}}, {"d": "2026-02-23", "h": 5.01, "s": {"Grey's Anatomy": 5.01}}, {"d": "2026-02-24", "h": 1.43, "s": {"Grey's Anatomy": 1.43}}, {"d": "2026-02-25", "h": 5.73, "s": {"Grey's Anatomy": 5.73}}, {"d": "2026-02-27", "h": 5.01, "s": {"Grey's Anatomy": 5.01}}, {"d": "2026-02-28", "h": 13.6, "s": {"Grey's Anatomy": 13.6}}, {"d": "2026-03-01", "h": 2.15, "s": {"Grey's Anatomy": 2.15}}, {"d": "2026-03-03", "h": 3.58, "s": {"The Rookie": 3.58}}, {"d": "2026-03-04", "h": 6.44, "s": {"The Rookie": 6.44}}, {"d": "2026-03-05", "h": 2.86, "s": {"The Rookie": 2.86}}, {"d": "2026-03-06", "h": 4.3, "s": {"The Vampire Diaries": 4.3}}, {"d": "2026-03-07", "h": 9.31, "s": {"The Vampire Diaries": 9.31}}, {"d": "2026-03-08", "h": 5.01, "s": {"The Vampire Diaries": 5.01}}, {"d": "2026-03-09", "h": 5.73, "s": {"The Vampire Diaries": 5.73}}, {"d": "2026-03-10", "h": 4.3, "s": {"The Vampire Diaries": 4.3}}, {"d": "2026-03-11", "h": 5.01, "s": {"The Night Agent": 2.15, "The Vampire Diaries": 2.86}}, {"d": "2026-03-12", "h": 1.43, "s": {"Virgin River": 1.43}}, {"d": "2026-03-13", "h": 5.73, "s": {"Virgin River": 5.73}}, {"d": "2026-03-14", "h": 3.58, "s": {"The Night Agent": 3.58}}, {"d": "2026-03-15", "h": 0.72, "s": {"A Perfect Story": 0.72}}, {"d": "2026-03-18", "h": 8.59, "s": {"Designated Survivor": 5.73, "The Mentalist": 1.43, "The Vampire Diaries": 1.43}}, {"d": "2026-03-19", "h": 0.72, "s": {"The Mentalist": 0.72}}, {"d": "2026-03-22", "h": 16.47, "s": {"The Mentalist": 15.75, "The Vampire Diaries": 0.72}}, {"d": "2026-03-23", "h": 3.58, "s": {"The Mentalist": 3.58}}, {"d": "2026-03-24", "h": 12.17, "s": {"The Mentalist": 12.17}}, {"d": "2026-03-25", "h": 5.01, "s": {"The Mentalist": 5.01}}, {"d": "2026-03-26", "h": 10.74, "s": {"The Mentalist": 10.74}}, {"d": "2026-03-27", "h": 6.44, "s": {"The Mentalist": 6.44}}, {"d": "2026-03-28", "h": 7.88, "s": {"The Mentalist": 7.88}}, {"d": "2026-03-29", "h": 14.32, "s": {"The Mentalist": 14.32}}, {"d": "2026-03-30", "h": 0.72, "s": {"The Mentalist": 0.72}}, {"d": "2026-03-31", "h": 2.86, "s": {"The Mentalist": 2.86}}, {"d": "2026-04-01", "h": 5.01, "s": {"Girlboss": 1.43, "The Mentalist": 3.58}}, {"d": "2026-04-02", "h": 5.73, "s": {"Girlboss": 0.72, "The Mentalist": 5.01}}, {"d": "2026-04-03", "h": 8.59, "s": {"The Mentalist": 8.59}}, {"d": "2026-04-04", "h": 5.01, "s": {"The Mentalist": 5.01}}, {"d": "2026-04-05", "h": 5.01, "s": {"Girlboss": 0.72, "The Mentalist": 4.3}}];

    function fmt(date) { const d = new Date(date); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

    // FUNCIÓN DE TEMA CON PERSISTENCIA
    function toggleTheme() {
        isLight = !isLight;
        localStorage.setItem('netflixTheme', isLight ? 'light' : 'dark');
        applyTheme();
    }

    function applyTheme() {
        if (isLight) {
            document.body.classList.add('light-mode');
            document.getElementById('themeBtn').innerText = "Modo Oscuro";
        } else {
            document.body.classList.remove('light-mode');
            document.getElementById('themeBtn').innerText = "Modo Claro";
        }
        if(mainChart) updateDashboard(); 
    }

    function updateDashboard() {
        const startStr = document.getElementById('start').value;
        const endStr = document.getElementById('end').value;
        if(!startStr || !endStr) return;

        const filtered = masterData.filter(i => i.d >= startStr && i.d <= endStr);
        const dStart = new Date(startStr + 'T00:00:00');
        const dEnd = new Date(endStr + 'T00:00:00');
        const daysInPeriod = Math.max(1, Math.round((dEnd - dStart) / 86400000) + 1);
        
        let totalH = 0, crit = 0; const sTotal = {};
        filtered.forEach(i => { 
            totalH += i.h; if (i.h > 5) crit++; 
            for(const [name, val] of Object.entries(i.s)) sTotal[name] = (sTotal[name] || 0) + val;
        });

        document.getElementById('m-daily').innerText = (totalH / daysInPeriod).toFixed(1) + "h";
        document.getElementById('m-weekly').innerText = ((totalH / daysInPeriod) * 7).toFixed(1) + "h";
        document.getElementById('m-total').innerText = totalH.toFixed(1) + "h";
        document.getElementById('m-crit').innerText = crit;

        const textColor = isLight ? '#141414' : '#FFF';
        const barColor = isLight ? '#333' : '#FFF';
        const gridColor = isLight ? '#ddd' : '#222';

        // TABLA RECORDS UNIFICADA TOP 15
        const sortedRecords = [...filtered].sort((a,b) => b.h - a.h).slice(0, 15);
        document.getElementById('records-table').innerHTML = sortedRecords.map(i => {
            const o = new Date(i.d+'T00:00:00');
            return `<tr><td><span style="font-size:0.6rem;color:var(--muted);display:block">${longDays[o.getDay()]} ${o.getDate()} ${shortMonths[o.getMonth()]}</span>${i.d.split('-').reverse().slice(0,2).join('/')}</td>
            <td class="hours-label">${i.h.toFixed(1)}h</td></tr>`;
        }).join('');

        // Actualizar Colores de Gráficos
        [mainChart, seriesChart, balanceChart, avgVsWorkChart].forEach(c => {
            if(c.options.scales.x) c.options.scales.x.ticks.color = textColor;
            if(c.options.scales.y) {
                c.options.scales.y.ticks.color = textColor;
                if(c.options.scales.y.grid) c.options.scales.y.grid.color = gridColor;
            }
        });

        const tDates = []; let cur = new Date(dStart); while (cur <= dEnd) { tDates.push(fmt(cur)); cur.setDate(cur.getDate() + 1); }
        const hData = tDates.map(dt => { const e = masterData.find(x => x.d === dt); return e ? e.h : 0; });
        const wSumLine = hData.map((_, i, arr) => {
            const s = Math.max(0, i - 3); const e = Math.min(arr.length, i + 4);
            const sub = arr.slice(s, e); return (sub.reduce((a, b) => a + b, 0) / sub.length) * 7;
        });
        mainChart.data.labels = tDates.map(dt => { const o = new Date(dt + 'T00:00:00'); return [shortDays[o.getDay()], o.getDate() + ' ' + shortMonths[o.getMonth()]]; });
        mainChart.data.datasets[0].data = hData;
        mainChart.data.datasets[0].backgroundColor = tDates.map(dt => (new Date(dt+'T00:00:00').getDay() === 0 || new Date(dt+'T00:00:00').getDay() === 6) ? '#E50914' : barColor);
        mainChart.data.datasets[1].data = wSumLine;
        mainChart.update();

        const sortedSeries = Object.entries(sTotal).sort((a,b) => b[1] - a[1]);
        seriesChart.data.labels = sortedSeries.map(x => x[0]);
        seriesChart.data.datasets[0].data = sortedSeries.map(x => x[1].toFixed(1));
        seriesChart.data.datasets[0].backgroundColor = sortedSeries.map(x => x[1] > 30 ? '#E50914' : (isLight ? '#666' : '#444'));
        seriesChart.update();

        const bLabels = []; const bData = []; let bPtr = new Date(dStart);
        const diff = bPtr.getDay() === 0 ? 6 : bPtr.getDay() - 1; bPtr.setDate(bPtr.getDate() - diff);
        while (bPtr <= dEnd) {
            let sum = 0; let mon = new Date(bPtr); let sun = new Date(bPtr); sun.setDate(sun.getDate() + 6);
            for(let j=0; j<7; j++) { const entry = masterData.find(x => x.d === fmt(bPtr)); sum += entry ? entry.h : 0; bPtr.setDate(bPtr.getDate() + 1); }
            bLabels.push(`${mon.getDate()} - ${sun.getDate()} ${shortMonths[mon.getMonth()]}`);
            bData.push(sum.toFixed(1));
        }
        balanceChart.data.labels = bLabels; balanceChart.data.datasets[0].data = bData;
        balanceChart.update();

        avgVsWorkChart.data.datasets[0].data = [40, (totalH / daysInPeriod * 7).toFixed(1)];
        avgVsWorkChart.update();
    }

    const insideLabelPlugin = {
        id: 'insideLabel',
        afterDatasetsDraw(chart) {
            if (chart.canvas.id !== 'seriesChart') return;
            const { ctx, data } = chart; ctx.save(); ctx.font = 'bold 10px sans-serif'; 
            ctx.fillStyle = isLight ? '#141414' : '#FFF'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            chart.getDatasetMeta(0).data.forEach((bar, i) => { 
                const val = data.datasets[0].data[i]; if(val > 0) ctx.fillText(data.labels[i].toUpperCase() + ' ('+val+'H)', bar.x - bar.width + 5, bar.y); 
            }); ctx.restore();
        }
    };

    window.onload = () => {
        // RECUPERAR TEMA GUARDADO
        const savedTheme = localStorage.getItem('netflixTheme');
        if (savedTheme === 'light') isLight = true;
        applyTheme();

        const lastDate = new Date(masterData[masterData.length - 1].d + 'T00:00:00');
        const thirtyAgo = new Date(lastDate); thirtyAgo.setDate(lastDate.getDate() - 30);
        document.getElementById('end').value = fmt(lastDate);
        document.getElementById('start').value = fmt(thirtyAgo);
        
        mainChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            data: { labels: [], datasets: [
                { type: 'bar', label: 'H/Día', data: [], yAxisID: 'y', order: 2 },
                { type: 'line', label: 'Suma', data: [], yAxisID: 'y1', borderColor: '#D4AF37', borderWidth: 3, pointRadius: 0, tension: 0.4, order: 1 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                scales: { 
                    x: { grid: { display: false } },
                    y: { min: 0, max: 18, ticks: { stepSize: 4, callback: v => v + 'h' }, grid: { color: '#222' } },
                    y1: { position: 'right', min: 0, max: 100, ticks: { color: '#D4AF37' } }
                }, plugins: { legend: { display: false } }
            }
        });

        seriesChart = new Chart(document.getElementById('seriesChart').getContext('2d'), {
            type: 'bar', plugins: [insideLabelPlugin],
            data: { labels: [], datasets: [{ data: [], borderRadius: 4 }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { display: false } } } }
        });

        balanceChart = new Chart(document.getElementById('balanceChart').getContext('2d'), {
            type: 'bar', data: { labels: [], datasets: [{ label: 'Horas', data: [], backgroundColor: '#E50914', borderRadius: 3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 9 } } }, y: { beginAtZero: true, suggestedMax: 60 } } }
        });

        avgVsWorkChart = new Chart(document.getElementById('avgVsWorkChart').getContext('2d'), {
            type: 'bar', data: { labels: ['TRABAJO', 'SERIES'], datasets: [{ data: [40, 0], backgroundColor: ['#333', '#E50914'], borderRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, suggestedMax: 60 } } }
        });

        updateDashboard();
        document.getElementById('start').addEventListener('change', updateDashboard);
        document.getElementById('end').addEventListener('change', updateDashboard);
    };

    function generatePDF() { html2pdf().from(document.getElementById('dashboard-content')).set({ margin: 0, filename: 'AUDITORIA_NETFLIX.pdf', html2canvas: { scale: 2, backgroundColor: isLight ? '#f5f5f5' : '#000' }, jsPDF: { format: 'a4', orientation: 'portrait' } }).save(); }
</script>
</body>
</html>
