<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netflix Audit Pro 2026 | Vista 30 Días</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --n-red: #E50914; --bg: #000; --card: #141414; --border: #2a2a2a; --text: #eee; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }

        @media (min-width: 1024px) {
            body { height: 100vh; overflow: hidden; }
            .container { height: 100vh; display: flex; flex-direction: column; padding: 20px; gap: 15px; }
            .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; flex: 1; min-height: 0; }
            .charts-left { display: grid; grid-template-rows: 1.2fr 1fr; gap: 15px; min-height: 0; }
        }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--n-red); padding-bottom: 10px; }
        .logo { color: var(--n-red); font-weight: 900; font-size: 1.6rem; letter-spacing: -1.5px; }
        .toolbar { display: flex; gap: 10px; align-items: center; }
        input[type="date"] { background: #222; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; font-size: 0.8rem; }
        .btn-pdf { background: var(--n-red); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .metric-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .metric-card h4 { margin: 0; font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .metric-card .val { font-size: 2rem; font-weight: 800; display: block; margin: 4px 0; color: #fff; }
        .metric-card .sub { font-size: 0.65rem; color: var(--n-red); font-weight: bold; }

        .chart-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; }
        .chart-box h2 { font-size: 0.8rem; margin: 0 0 12px 0; color: #aaa; text-transform: uppercase; border-left: 3px solid var(--n-red); padding-left: 10px; }
        .canvas-container { flex: 1; position: relative; min-height: 220px; }

        .section-sep { font-size: 0.65rem; color: #555; font-weight: 900; margin: 15px 0 5px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 3px; display: flex; justify-content: space-between; }
        .top-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .top-table td { padding: 8px 0; border-bottom: 1px solid #222; }
        .day-label { font-size: 0.65rem; color: #666; text-transform: uppercase; display: block; }
        .hours-label { text-align: right; font-weight: 800; color: var(--n-red); font-size: 1rem; }
    </style>
</head>
<body>

<div class="container" id="dashboard-content">
    <header>
        <div class="logo">NETFLIX AUDIT PRO</div>
        <div class="toolbar no-print">
            <input type="date" id="start">
            <input type="date" id="end">
            <button class="btn-pdf" onclick="generatePDF()">PDF</button>
        </div>
    </header>

    <div class="metrics-grid">
        <div class="metric-card"><h4>Media Diaria</h4><span class="val" id="m-daily">0.0h</span><span class="sub">HISTÓRICO</span></div>
        <div class="metric-card"><h4>Media Semanal</h4><span class="val" id="m-weekly">0.0h</span><span class="sub">PROYECTADA</span></div>
        <div class="metric-card"><h4>Total Acumulado</h4><span class="val" id="m-total">0.0h</span><span class="sub">HORAS PERIODO</span></div>
        <div class="metric-card"><h4>Consumo Crítico</h4><span class="val" id="m-crit">0</span><span class="sub">DÍAS > 5 HORAS</span></div>
    </div>

    <div class="main-grid">
        <div class="charts-left">
            <div class="chart-box">
                <h2>Cronología Detallada (30 Días)</h2>
                <div class="canvas-container"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h2>Impacto por Serie</h2>
                <div class="canvas-container"><canvas id="seriesChart"></canvas></div>
            </div>
        </div>

        <aside class="chart-box">
            <h2>Récords del Periodo</h2>
            <div class="section-sep"><span>Fin de Semana</span><span>S-D</span></div>
            <table class="top-table" id="we-table"></table>
            
            <div class="section-sep" style="margin-top:20px;"><span>Entre Semana</span><span>L-V</span></div>
            <table class="top-table" id="wd-table"></table>
        </aside>
    </div>
</div>

<script>
    const shortDays = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    const shortMonths = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
    const longDays = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

    const masterData = [
        { d: '2026-02-01', h: 5.73 }, { d: '2026-02-02', h: 8.6 }, { d: '2026-02-03', h: 5.73 }, 
        { d: '2026-02-04', h: 8.02 }, { d: '2026-02-05', h: 7.88 }, { d: '2026-02-06', h: 6.45 }, 
        { d: '2026-02-07', h: 10.75 }, { d: '2026-02-08', h: 12.9 }, { d: '2026-02-09', h: 7.16 },
        { d: '2026-02-10', h: 2.86 }, { d: '2026-02-17', h: 0.71 }, { d: '2026-02-22', h: 2.86 },
        { d: '2026-02-23', h: 5.73 }, { d: '2026-02-24', h: 0.71 }, { d: '2026-02-25', h: 5.83 },
        { d: '2026-02-27', h: 3.5 }, { d: '2026-02-28', h: 12.0 }, { d: '2026-03-01', h: 7.0 },
        { d: '2026-03-03', h: 2.86 }, { d: '2026-03-04', h: 9.31 }, { d: '2026-03-05', h: 3.58 },
        { d: '2026-03-06', h: 5.01 }, { d: '2026-03-07', h: 10.6 }, { d: '2026-03-08', h: 5.6 },
        { d: '2026-03-09', h: 5.6 }, { d: '2026-03-10', h: 4.2 }, { d: '2026-03-11', h: 5.0 },
        { d: '2026-03-12', h: 1.43 }, { d: '2026-03-13', h: 5.73 }, { d: '2026-03-14', h: 3.58 },
        { d: '2026-03-15', h: 0.71 }, { d: '2026-03-18', h: 7.16 }, { d: '2026-03-19', h: 0.71 },
        { d: '2026-03-22', h: 13.5 }, { d: '2026-03-23', h: 2.86 }, { d: '2026-03-24', h: 10.75 },
        { d: '2026-03-25', h: 5.01 }, { d: '2026-03-26', h: 11.2 }, { d: '2026-03-27', h: 5.73 },
        { d: '2026-03-28', h: 7.88 }, { d: '2026-03-29', h: 16.48 }, { d: '2026-03-30', h: 1.43 },
        { d: '2026-03-31', h: 2.15 }, { d: '2026-04-01', h: 4.29 }, { d: '2026-04-02', h: 5.59 },
        { d: '2026-04-03', h: 8.6 }, { d: '2026-04-04', h: 5.73 }, { d: '2026-04-05', h: 6.45 }
    ];

    let mainChart;

    function getDatesInRange(startDate, endDate) {
        const date = new Date(startDate + 'T00:00:00');
        const end = new Date(endDate + 'T00:00:00');
        const dates = [];
        while (date <= end) {
            dates.push(new Date(date).toISOString().split('T')[0]);
            date.setDate(date.getDate() + 1);
        }
        return dates;
    }

    function updateDashboard() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        
        const fullTimelineDates = getDatesInRange(start, end);
        const timelineData = fullTimelineDates.map(dateStr => {
            const entry = masterData.find(i => i.d === dateStr);
            return { d: dateStr, h: entry ? entry.h : 0 };
        });

        const filteredRecordsOnly = masterData.filter(i => i.d >= start && i.d <= end);

        let totalH = 0, critical = 0;
        const wdRecords = [], weRecords = [];

        filteredRecordsOnly.forEach(i => {
            totalH += i.h;
            if (i.h > 5) critical++;
            const day = new Date(i.d + 'T00:00:00').getDay();
            if (day === 0 || day === 6) weRecords.push(i); else wdRecords.push(i);
        });

        const dailyAvg = fullTimelineDates.length ? totalH / fullTimelineDates.length : 0;
        document.getElementById('m-daily').innerText = dailyAvg.toFixed(1) + "h";
        document.getElementById('m-weekly').innerText = (dailyAvg * 7).toFixed(1) + "h";
        document.getElementById('m-total').innerText = totalH.toFixed(1) + "h";
        document.getElementById('m-crit').innerText = critical;

        const fillTable = (elId, data) => {
            document.getElementById(elId).innerHTML = data.sort((a,b) => b.h - a.h).slice(0, 5).map((i, idx) => `
                <tr>
                    <td style="color:var(--n-red); font-weight:bold; width:20px">${idx+1}</td>
                    <td><span class="day-label">${longDays[new Date(i.d+'T00:00:00').getDay()]}</span>${i.d.split('-').reverse().slice(0,2).join('/')}</td>
                    <td class="hours-label">${i.h.toFixed(1)}h</td>
                </tr>`).join('');
        };
        fillTable('we-table', weRecords);
        fillTable('wd-table', wdRecords);

        if (mainChart) {
            mainChart.data.labels = timelineData.map(i => {
                const dateObj = new Date(i.d + 'T00:00:00');
                return [shortDays[dateObj.getDay()] + ' ' + dateObj.getDate(), shortMonths[dateObj.getMonth()]];
            });
            mainChart.data.datasets[0].data = timelineData.map(i => i.h);
            mainChart.data.datasets[0].backgroundColor = timelineData.map(i => {
                if (i.h === 0) return '#1a1a1a';
                const day = new Date(i.d+'T00:00:00').getDay();
                return (day === 0 || day === 6) ? '#E50914' : '#444';
            });
            mainChart.update();
        }
    }

    window.onload = () => {
        // Establecer últimos 30 días por defecto
        const today = new Date('2026-04-06T00:00:00'); // Fecha de hoy según contexto
        const thirtyDaysAgo = new Date(today);
        thirtyDaysAgo.setDate(today.getDate() - 30);

        document.getElementById('end').value = today.toISOString().split('T')[0];
        document.getElementById('start').value = thirtyDaysAgo.toISOString().split('T')[0];

        Chart.defaults.color = '#777';
        mainChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], borderRadius: 2 }] },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { x: { ticks: { font: { size: 9 }, maxRotation: 0, autoSkip: true } } }
            }
        });

        new Chart(document.getElementById('seriesChart').getContext('2d'), {
            type: 'bar',
            data: { 
                labels: ['The Rookie', 'El Mentalista', 'Crónicas Vampíricas', 'Agente Nocturno', 'Girlboss'],
                datasets: [{ data: [136.2, 118.5, 92.4, 38.0, 6.4], backgroundColor: '#E50914', borderRadius: 4 }]
            },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        document.getElementById('start').addEventListener('change', updateDashboard);
        document.getElementById('end').addEventListener('change', updateDashboard);
        updateDashboard();
    };

    function generatePDF() {
        const element = document.getElementById('dashboard-content');
        html2pdf().from(element).set({
            margin: 0, filename: 'Netflix_Audit_30Days.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#000' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
    }
</script>
</body>
</html>
